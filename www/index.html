<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FLOR</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 2rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <p>
        Если вы видите эту страницу внутри APK: в корне проекта откройте
        <code>capacitor.config.json</code> и в блоке <code>server.url</code> укажите полный адрес вашего FLOR
        сервера (лучше <strong>https://</strong> для звонков), затем выполните
        <code>npx cap sync android</code>.
    </p>
</body>
</html>
